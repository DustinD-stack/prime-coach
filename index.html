<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PRIME Coach — Warm-Up & Recovery</title>
<meta name="description" content="Build per-client warm-ups, mobility, and cooldowns, then coach the session with a guided timer.">
<!-- PWA / installable -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#12141C">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PRIME">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12141C; --bg2:#0C0E14; --surface:#1A1E29; --surface2:#232838;
    --line:#2B3142; --text:#F3F4F7; --muted:#99A1B3; --muted2:#6E7689;
    --amber:#FF7A2F; --amber-soft:rgba(255,122,47,.14);
    --volt:#BCF23A; --volt-soft:rgba(188,242,58,.13);
    --cool:#33D6C3; --cool-soft:rgba(51,214,195,.13);
    --steel:#6EA8FF; --steel-soft:rgba(110,168,255,.13);
    --red:#FF5A5A; --red-soft:rgba(255,90,90,.13);
    --yellow:#FFC53D; --yellow-soft:rgba(255,197,61,.13);
    --green:#4ED98A; --green-soft:rgba(78,217,138,.13);
    --radius:16px; --radius-sm:12px;
    --shadow:0 10px 30px -12px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:
      radial-gradient(1100px 700px at 50% -8%, #1b2030 0%, var(--bg) 46%, var(--bg2) 100%);
    color:var(--text);
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    min-height:100dvh; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Bebas Neue',Impact,sans-serif; letter-spacing:.02em; line-height:.92}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  a{color:var(--cool)}
  :focus-visible{outline:3px solid var(--volt); outline-offset:2px; border-radius:8px}

  /* ---------- App shell (phone frame) ---------- */
  .app{
    position:relative; width:100%; max-width:480px; margin:0 auto;
    min-height:100dvh; padding:0 16px 96px;
    background:linear-gradient(180deg, rgba(26,30,41,.35), rgba(18,20,28,.0) 220px);
  }
  @media(min-width:520px){
    .app{ box-shadow:0 0 0 1px var(--line), 0 30px 80px -30px #000;
      border-radius:28px; margin-top:18px; margin-bottom:18px; min-height:calc(100dvh - 36px); overflow:hidden}
  }

  /* ---------- Top bar ---------- */
  .topbar{position:sticky; top:0; z-index:30; padding:14px 2px 12px;
    background:linear-gradient(180deg, var(--bg) 62%, rgba(18,20,28,.0));
    display:flex; align-items:center; gap:11px}
  .logo{width:38px; height:38px; border-radius:11px; flex:none; position:relative;
    background:linear-gradient(135deg,var(--amber),#ff5e1f); box-shadow:0 6px 16px -6px rgba(255,122,47,.7)}
  .logo svg{position:absolute; inset:0}
  .brand h1{font-size:25px; margin:0; letter-spacing:.06em}
  .brand p{margin:0; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted)}
  .topbar .back{margin-left:auto; font-size:13px; font-weight:600; color:var(--muted);
    padding:8px 12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); display:none}
  .topbar .back.show{display:inline-flex; align-items:center; gap:6px}

  /* ---------- Generic bits ---------- */
  .view{animation:fade .28s ease}
  @keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
  @media(prefers-reduced-motion:reduce){.view,.runner-in,.sheet{animation:none}}
  .eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted2); font-weight:700; margin:22px 0 10px}
  .eyebrow.first{margin-top:6px}
  .hero{margin:8px 0 6px}
  .hero h2{font-size:42px; margin:0 0 6px; letter-spacing:.01em}
  .hero h2 .hot{color:var(--amber)} .hero h2 .cold{color:var(--cool)}
  .hero p{margin:0; color:var(--muted); font-size:14px; max-width:32ch}
  .court{position:absolute; right:-30px; top:-10px; width:170px; height:170px; opacity:.5; pointer-events:none; z-index:-1}

  .pill{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700;
    padding:5px 10px; border-radius:999px; border:1px solid var(--line); background:var(--surface); color:var(--muted)}
  .pill.amber{color:var(--amber); border-color:rgba(255,122,47,.4); background:var(--amber-soft)}
  .pill.volt{color:var(--volt); border-color:rgba(188,242,58,.4); background:var(--volt-soft)}
  .pill.cool{color:var(--cool); border-color:rgba(51,214,195,.4); background:var(--cool-soft)}
  .pill.steel{color:var(--steel); border-color:rgba(110,168,255,.4); background:var(--steel-soft)}
  .pill.red{color:var(--red); border-color:rgba(255,90,90,.4); background:var(--red-soft)}
  .chips{display:flex; flex-wrap:wrap; gap:8px}

  /* ---------- Wizard ---------- */
  .wizard{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow)}
  .wizard h3{margin:0 0 3px; font-size:18px}
  .wizard .sub{margin:0 0 14px; font-size:12.5px; color:var(--muted)}
  .field{margin-bottom:12px}
  .field label{display:block; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted2); font-weight:700; margin-bottom:7px}
  .seg{display:flex; gap:6px; flex-wrap:wrap}
  .seg button{flex:1; min-width:fit-content; padding:9px 8px; font-size:13px; font-weight:600; border-radius:10px;
    background:var(--bg2); border:1px solid var(--line); color:var(--muted); transition:.15s}
  .seg button.on{background:var(--amber); color:#1a1206; border-color:var(--amber); box-shadow:0 4px 12px -4px rgba(255,122,47,.6)}
  .seg.cool button.on{background:var(--cool); color:#06201d; border-color:var(--cool); box-shadow:0 4px 12px -4px rgba(51,214,195,.5)}
  select.input{width:100%; padding:11px 12px; border-radius:10px; background:var(--bg2);
    border:1px solid var(--line); color:var(--text); font-size:14px; font-family:inherit; appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 18px) 18px,calc(100% - 13px) 18px; background-size:5px 5px; background-repeat:no-repeat}
  .check{display:flex; align-items:center; gap:9px; font-size:13.5px; color:var(--text); padding:4px 0}
  .check input{width:18px; height:18px; accent-color:var(--red)}
  .btn-go{width:100%; margin-top:6px; padding:14px; border-radius:12px; font-size:15px; font-weight:800; letter-spacing:.02em;
    background:linear-gradient(135deg,var(--volt),#a6e02a); color:#15200a; box-shadow:0 8px 22px -8px rgba(188,242,58,.6)}
  .result{margin-top:14px; border:1px dashed rgba(188,242,58,.5); background:var(--volt-soft); border-radius:12px; padding:14px; display:none}
  .result.show{display:block; animation:fade .3s ease}
  .result .lead{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--volt); font-weight:700}
  .result h4{margin:4px 0 8px; font-size:20px}
  .result .add{font-size:13px; color:var(--text); background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:9px 11px; margin-top:8px}
  .result .add b{color:var(--cool)}
  .result .add.warn b{color:var(--red)}
  .result button.open{margin-top:12px; width:100%; padding:11px; border-radius:10px; font-weight:700; background:var(--text); color:#10131b}

  /* ---------- Cards / grids ---------- */
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:11px}
  .grid1{display:grid; gap:11px}
  .rcard{position:relative; text-align:left; border-radius:var(--radius); padding:15px 14px 14px; border:1px solid var(--line);
    background:var(--surface); transition:transform .12s, border-color .15s; overflow:hidden; width:100%; display:block}
  .rcard:active{transform:scale(.98)}
  .rcard .accent{position:absolute; left:0; top:0; bottom:0; width:4px}
  .rcard.warm .accent{background:linear-gradient(var(--amber),#ff5e1f)} 
  .rcard.cold .accent{background:linear-gradient(var(--cool),#1fae9e)}
  .rcard.power .accent{background:linear-gradient(var(--volt),#9bd826)}
  .rcard.lift .accent{background:linear-gradient(var(--steel),#3f7fe0)}
  .rcard .time{font-family:'Bebas Neue',sans-serif; font-size:30px; line-height:.9; letter-spacing:.02em}
  .rcard.warm .time{color:var(--amber)} .rcard.cold .time{color:var(--cool)}
  .rcard.power .time{color:var(--volt)} .rcard.lift .time{color:var(--steel)}
  .rcard h3{margin:6px 0 4px; font-size:15px; letter-spacing:.01em; line-height:1.2}
  .rcard p{margin:0; font-size:11.5px; color:var(--muted); line-height:1.4}
  .rcard .tag{position:absolute; top:13px; right:13px; font-size:9.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted2); font-weight:700}

  .navcard{display:flex; align-items:center; gap:13px; text-align:left; width:100%;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); padding:14px 14px}
  .navcard:active{transform:scale(.99)}
  .navcard .ic{width:42px; height:42px; border-radius:11px; flex:none; display:grid; place-items:center; font-size:20px}
  .navcard .ic.amber{background:var(--amber-soft); color:var(--amber)}
  .navcard .ic.volt{background:var(--volt-soft); color:var(--volt)}
  .navcard .ic.cool{background:var(--cool-soft); color:var(--cool)}
  .navcard .ic.steel{background:var(--steel-soft); color:var(--steel)}
  .navcard .ic.red{background:var(--red-soft); color:var(--red)}
  .navcard .ic.muted{background:var(--surface2); color:var(--muted)}
  .navcard .txt h3{margin:0; font-size:14.5px}
  .navcard .txt p{margin:1px 0 0; font-size:11.5px; color:var(--muted)}
  .navcard .arr{margin-left:auto; color:var(--muted2); font-size:18px}

  /* ---------- Routine detail ---------- */
  .rd-head{margin:6px 0 4px}
  .rd-head h2{font-size:30px; margin:8px 0 8px; letter-spacing:.01em; line-height:1}
  .callout{border-radius:12px; padding:12px 13px; font-size:12.5px; margin:12px 0; border:1px solid var(--line); background:var(--surface)}
  .callout.scale{border-color:rgba(110,168,255,.35); background:var(--steel-soft)}
  .callout.scale b{color:var(--steel)}
  .callout .row{display:flex; gap:8px; margin-top:6px}
  .callout .row span{font-weight:700; color:var(--steel); min-width:74px; flex:none}
  table.steps{width:100%; border-collapse:collapse; margin:8px 0 2px; font-size:13px}
  table.steps th{text-align:left; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted2);
    font-weight:700; padding:6px 8px 8px; border-bottom:1px solid var(--line)}
  table.steps td{padding:11px 8px; border-bottom:1px solid var(--line); vertical-align:top}
  table.steps tr:last-child td{border-bottom:none}
  table.steps .mv{font-weight:600}
  table.steps .ds{color:var(--amber); font-weight:700; white-space:nowrap; font-size:12.5px}
  .cold-accent table.steps .ds{color:var(--cool)}
  table.steps .cu{color:var(--muted); font-size:12px; display:block; margin-top:3px}
  .run-btn{position:sticky; bottom:84px; width:100%; padding:16px; border-radius:14px; font-size:17px; font-weight:800;
    letter-spacing:.04em; margin:16px 0 6px; background:linear-gradient(135deg,var(--amber),#ff5e1f); color:#1a1206;
    box-shadow:0 12px 30px -10px rgba(255,122,47,.7); display:flex; align-items:center; justify-content:center; gap:9px}
  .cold-accent .run-btn{background:linear-gradient(135deg,var(--cool),#1fae9e); color:#06201d; box-shadow:0 12px 30px -10px rgba(51,214,195,.6)}
  .ghost-btn{width:100%; padding:12px; border-radius:11px; font-weight:700; font-size:13.5px; color:var(--muted);
    background:var(--surface); border:1px solid var(--line); margin-bottom:8px}

  /* ---------- Exercise library cards ---------- */
  .filterbar{display:flex; gap:7px; overflow-x:auto; padding:4px 0 12px; margin:0 -2px; scrollbar-width:none}
  .filterbar::-webkit-scrollbar{display:none}
  .filterbar button{flex:none; padding:7px 13px; border-radius:999px; font-size:12.5px; font-weight:600;
    background:var(--surface); border:1px solid var(--line); color:var(--muted); white-space:nowrap}
  .filterbar button.on{background:var(--text); color:#10131b; border-color:var(--text)}
  .ex{border:1px solid var(--line); background:var(--surface); border-radius:var(--radius-sm); padding:14px; margin-bottom:11px}
  .ex .top{display:flex; align-items:flex-start; gap:8px; justify-content:space-between}
  .ex h3{margin:0; font-size:15px; line-height:1.2}
  .ex .badge{font-size:9px; letter-spacing:.1em; text-transform:uppercase; font-weight:800; padding:3px 8px; border-radius:6px; flex:none; margin-top:1px}
  .badge.dyn{background:var(--amber-soft); color:var(--amber)}
  .badge.act{background:var(--volt-soft); color:var(--volt)}
  .badge.sta{background:var(--cool-soft); color:var(--cool)}
  .badge.plyo{background:var(--steel-soft); color:var(--steel)}
  .ex .dose{font-size:12px; color:var(--amber); font-weight:700; margin:6px 0 10px}
  .ex .line{display:flex; gap:9px; font-size:12.5px; padding:5px 0; align-items:baseline}
  .ex .line .k{flex:none; width:18px; font-weight:800; font-size:13px}
  .ex .cue .k{color:var(--volt)} .ex .miss .k{color:var(--red)} .ex .pro .k{color:var(--green)} .ex .reg .k{color:var(--steel)}
  .ex .line .v{color:var(--text)} .ex .line .v b{color:var(--muted); font-weight:600}
  .areatags{margin-top:9px; display:flex; flex-wrap:wrap; gap:5px}
  .areatags span{font-size:10px; color:var(--muted2); background:var(--bg2); border:1px solid var(--line); padding:2px 7px; border-radius:6px}

  /* ---------- Content blocks ---------- */
  .block{border:1px solid var(--line); background:var(--surface); border-radius:var(--radius-sm); padding:15px; margin-bottom:12px}
  .block h3{margin:0 0 8px; font-size:16px}
  .block p{margin:0 0 8px; font-size:13.5px; color:var(--text)}
  .block p:last-child{margin-bottom:0}
  .block ul{margin:6px 0 0; padding-left:18px; font-size:13.5px}
  .block li{margin-bottom:7px}
  .light{display:flex; gap:12px; align-items:flex-start; border-radius:12px; padding:13px; margin-bottom:11px; border:1px solid var(--line)}
  .light .dot{width:16px; height:16px; border-radius:50%; flex:none; margin-top:3px}
  .light.g{background:var(--green-soft); border-color:rgba(78,217,138,.35)} .light.g .dot{background:var(--green)}
  .light.y{background:var(--yellow-soft); border-color:rgba(255,197,61,.35)} .light.y .dot{background:var(--yellow)}
  .light.r{background:var(--red-soft); border-color:rgba(255,90,90,.4)} .light.r .dot{background:var(--red)}
  .light h4{margin:0 0 3px; font-size:14.5px} .light h4 small{font-weight:600; color:var(--muted); font-size:12px}
  .light p{margin:0; font-size:12.5px; color:var(--text)}
  .qrow{display:flex; gap:11px; padding:12px 2px; border-bottom:1px solid var(--line); font-size:13.5px}
  .qrow:last-child{border-bottom:none}
  .qrow .n{font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--amber); flex:none; width:26px; line-height:1}
  .qrow .q b{display:block; color:var(--text)} .qrow .q span{font-size:12px; color:var(--muted)}
  .script{border-left:3px solid var(--amber); padding:4px 0 4px 14px; margin:10px 0; font-size:13.5px; color:var(--text); font-style:italic}
  .script.post{border-color:var(--cool)}
  .wtable{width:100%; border-collapse:collapse; font-size:12.5px}
  .wtable th{text-align:left; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted2); font-weight:700; padding:8px 6px; border-bottom:1px solid var(--line)}
  .wtable td{padding:10px 6px; border-bottom:1px solid var(--line); vertical-align:top}
  .wtable tr:last-child td{border-bottom:none}
  .wtable td:first-child{font-weight:700; white-space:nowrap}

  /* ---------- Bottom nav ---------- */
  .tabbar{position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:480px; z-index:40;
    display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); gap:2px;
    background:linear-gradient(180deg, rgba(12,14,20,.0), var(--bg2) 38%); backdrop-filter:blur(10px)}
  .tabbar .border{position:absolute; top:8px; left:8px; right:8px; height:62px; border:1px solid var(--line);
    background:rgba(26,30,41,.92); border-radius:18px; z-index:-1}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:11px 2px; color:var(--muted2); border-radius:14px}
  .tab svg{width:21px; height:21px}
  .tab span{font-size:9.5px; font-weight:700; letter-spacing:.03em}
  .tab.on{color:var(--amber)}
  .tab.on.cooltab{color:var(--cool)}

  /* ---------- Runner overlay ---------- */
  .runner{position:fixed; inset:0; z-index:100; background:
    radial-gradient(900px 600px at 50% 0%, #1c2230, var(--bg2) 60%); display:none; flex-direction:column;
    padding:max(20px,env(safe-area-inset-top)) 22px max(22px,env(safe-area-inset-bottom))}
  .runner.show{display:flex}
  .runner-in{display:flex; flex-direction:column; height:100%; animation:fade .3s ease}
  .runner .rtop{display:flex; align-items:center; justify-content:space-between}
  .runner .rtop .rname{font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:700}
  .runner .x{width:40px; height:40px; border-radius:50%; background:var(--surface); border:1px solid var(--line); font-size:18px; color:var(--muted)}
  .progress{display:flex; gap:4px; margin:18px 0 6px}
  .progress i{flex:1; height:4px; border-radius:3px; background:var(--surface2)}
  .progress i.done{background:var(--volt)} .progress i.cur{background:var(--amber)}
  .progress.cold i.done{background:var(--cool)} .progress.cold i.cur{background:var(--cool)}
  .stepwrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:4px}
  .stepwrap .count{font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted2); font-weight:700}
  .stepwrap .movename{font-family:'Bebas Neue',sans-serif; font-size:clamp(38px,12vw,58px); margin:6px 0 2px; letter-spacing:.01em; line-height:.95}
  .stepwrap .dosebig{font-size:17px; color:var(--amber); font-weight:800; margin-bottom:22px}
  .cold-run .stepwrap .dosebig{color:var(--cool)}
  .clock{font-family:'Bebas Neue',sans-serif; font-size:clamp(78px,26vw,120px); line-height:.85; letter-spacing:.02em;
    color:var(--text); font-variant-numeric:tabular-nums}
  .clock.flash{animation:flash .5s ease}
  @keyframes flash{0%,100%{color:var(--text)} 40%{color:var(--volt)}}
  .cuebar{margin-top:18px; border:1px solid rgba(188,242,58,.4); background:var(--volt-soft); border-radius:14px; padding:13px 15px; max-width:380px}
  .cuebar .lbl{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--volt); font-weight:800}
  .cuebar p{margin:3px 0 0; font-size:14.5px; color:var(--text); line-height:1.35}
  .rctrl{display:flex; gap:10px; align-items:center; margin-top:18px}
  .rctrl button{flex:1; padding:15px; border-radius:13px; font-weight:800; font-size:15px; border:1px solid var(--line); background:var(--surface); color:var(--text)}
  .rctrl .next{flex:1.6; background:linear-gradient(135deg,var(--amber),#ff5e1f); color:#1a1206; border:none}
  .cold-run .rctrl .next{background:linear-gradient(135deg,var(--cool),#1fae9e); color:#06201d}
  .rctrl .play{flex:none; width:56px; font-size:18px}
  .autorow{display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; font-size:12px; color:var(--muted)}
  .autorow input{accent-color:var(--volt)}
  .done-screen{text-align:center; padding:30px 10px}
  .done-screen .big{font-family:'Bebas Neue',sans-serif; font-size:54px; color:var(--volt); letter-spacing:.02em}
  .cold-run .done-screen .big{color:var(--cool)}

  .foot{text-align:center; font-size:11px; color:var(--muted2); padding:24px 10px 8px; line-height:1.6}

  /* ---------- Print ---------- */
  #printArea{display:none}
  @media print{
    body{background:#fff; color:#000}
    .app,.tabbar,.runner,.topbar{display:none !important}
    #printArea{display:block; padding:0}
    .pcard{border:1.5px solid #222; border-radius:10px; padding:12px 14px; margin:0 0 10px; break-inside:avoid; page-break-inside:avoid}
    .pcard h3{margin:0 0 2px; font-size:15px; font-family:Arial,sans-serif}
    .pcard .pd{font-size:11px; color:#444; margin-bottom:6px; font-weight:bold}
    .pcard .pl{font-size:12px; margin:3px 0; font-family:Arial,sans-serif}
    .pcard .pl b{display:inline-block; width:96px}
    #printArea h1{font-size:20px; font-family:Arial,sans-serif; margin:0 0 2px}
    #printArea .psub{font-size:12px; color:#444; margin:0 0 14px}
    @page{margin:14mm}
  }

  /* ---------- Forms / buttons (Phase 1) ---------- */
  input.input, textarea.input{width:100%; padding:11px 12px; border-radius:10px; background:var(--bg2);
    border:1px solid var(--line); color:var(--text); font-size:14px; font-family:inherit}
  textarea.input{min-height:72px; resize:vertical; line-height:1.45}
  input.input::placeholder, textarea.input::placeholder{color:var(--muted2)}
  input.input:focus, textarea.input:focus, select.input:focus{border-color:var(--amber); outline:none}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:13px 16px;
    border-radius:12px; font-weight:800; font-size:14.5px; letter-spacing:.01em; border:none}
  .btn.primary{background:linear-gradient(135deg,var(--amber),#ff5e1f); color:#1a1206; box-shadow:0 8px 22px -10px rgba(255,122,47,.7)}
  .btn.coolb{background:linear-gradient(135deg,var(--cool),#1fae9e); color:#06201d}
  .btn.sec{background:var(--surface); border:1px solid var(--line); color:var(--text); font-weight:700}
  .btn.danger{background:var(--red-soft); border:1px solid rgba(255,90,90,.4); color:var(--red); font-weight:700}
  .btn.full{width:100%}
  .btn.sm{padding:9px 13px; font-size:13px; border-radius:10px}
  .btnrow{display:flex; gap:10px; margin:16px 0 4px}

  /* ---------- Clients ---------- */
  .add-primary{width:100%; margin:2px 0 16px; padding:15px; border-radius:14px; font-weight:800; font-size:15px;
    letter-spacing:.02em; background:linear-gradient(135deg,var(--amber),#ff5e1f); color:#1a1206;
    box-shadow:0 10px 26px -10px rgba(255,122,47,.6); display:flex; align-items:center; justify-content:center; gap:9px}
  .cl-card{display:flex; align-items:center; gap:13px; width:100%; text-align:left; background:var(--surface);
    border:1px solid var(--line); border-radius:var(--radius-sm); padding:14px; margin-bottom:11px}
  .cl-card:active{transform:scale(.99)}
  .cl-av{width:46px; height:46px; border-radius:13px; flex:none; display:grid; place-items:center;
    font-family:'Bebas Neue',sans-serif; font-size:22px; color:#1a1206; background:linear-gradient(135deg,var(--amber),#ff7e3a)}
  .cl-card .ct{min-width:0}
  .cl-card .ct h3{margin:0; font-size:15.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cl-card .ct p{margin:2px 0 0; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cl-card .cnt{margin-left:auto; display:flex; flex-direction:column; align-items:flex-end; gap:1px; flex:none; padding-left:8px}
  .cl-card .cnt b{font-family:'Bebas Neue',sans-serif; font-size:23px; color:var(--cool); line-height:1}
  .cl-card .cnt span{font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted2); font-weight:700}
  .empty{text-align:center; border:1px dashed var(--line); border-radius:var(--radius); padding:34px 22px; color:var(--muted); background:var(--surface)}
  .empty .em-ic{font-size:34px; margin-bottom:10px}
  .empty h3{margin:0 0 6px; font-size:17px; color:var(--text)}
  .empty p{margin:0 auto 0; font-size:13px; max-width:30ch}

  /* ---------- Program cards (in client detail) ---------- */
  .pg-card{position:relative; width:100%; text-align:left; background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius-sm); padding:14px 14px 13px 16px; margin-bottom:11px; overflow:hidden}
  .pg-card .accent{position:absolute; left:0; top:0; bottom:0; width:4px}
  .pg-card.warm .accent{background:linear-gradient(var(--amber),#ff5e1f)}
  .pg-card.cool .accent{background:linear-gradient(var(--cool),#1fae9e)}
  .pg-card .pg-top{display:flex; align-items:flex-start; gap:8px; justify-content:space-between}
  .pg-card h3{margin:0; font-size:15px; line-height:1.2}
  .kindtag{flex:none; font-size:9px; letter-spacing:.1em; text-transform:uppercase; font-weight:800; padding:3px 8px; border-radius:6px; margin-top:1px}
  .kindtag.warm{background:var(--amber-soft); color:var(--amber)}
  .kindtag.cool{background:var(--cool-soft); color:var(--cool)}
  .pg-card .pg-sub{font-size:12px; color:var(--muted); margin:6px 0 12px}
  .pg-card .pg-act{display:flex; gap:8px}

  /* ---------- Program builder ---------- */
  .bcount{font-size:12px; color:var(--muted); text-align:center; margin:2px 0 12px}
  .bstep{display:flex; gap:10px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:11px 11px 11px 9px; margin-bottom:10px}
  .bstep .ord{display:flex; flex-direction:column; gap:5px; flex:none; padding-top:1px}
  .bstep .ord button{width:30px; height:26px; border-radius:8px; background:var(--bg2); border:1px solid var(--line); color:var(--muted); font-size:12px; display:grid; place-items:center}
  .bstep .ord button:disabled{opacity:.3}
  .bstep .bmain{flex:1; min-width:0}
  .bstep .bmove{font-weight:700; font-size:14px; display:flex; align-items:flex-start; justify-content:space-between; gap:8px; line-height:1.25}
  .bstep .bmove .del{flex:none; color:var(--red); background:var(--red-soft); border:1px solid rgba(255,90,90,.35); width:28px; height:28px; border-radius:8px; font-size:13px}
  .bstep .brow{display:flex; gap:8px; margin-top:9px}
  .bstep .brow .bf{flex:1; min-width:0}
  .bstep .brow .bf.dose{flex:none; width:100px}
  .bstep .brow label{display:block; font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted2); font-weight:700; margin-bottom:4px}
  .bstep input.bi, .bstep textarea.bi{width:100%; padding:8px 9px; border-radius:8px; background:var(--bg2); border:1px solid var(--line); color:var(--text); font-size:12.5px; font-family:inherit}
  .bstep textarea.bi{resize:vertical; min-height:34px; line-height:1.35}
  .bstep input.bi:focus, .bstep textarea.bi:focus{border-color:var(--amber); outline:none}
  .add-ex{width:100%; padding:13px; border-radius:12px; border:1px dashed rgba(188,242,58,.5); background:var(--volt-soft);
    color:var(--volt); font-weight:800; font-size:14px; margin:4px 0 8px; display:flex; align-items:center; justify-content:center; gap:8px}

  /* ---------- Picker sheet ---------- */
  .sheet{position:fixed; inset:0; z-index:90; display:none; flex-direction:column; background:rgba(8,10,14,.62); backdrop-filter:blur(3px)}
  .sheet.show{display:flex}
  .sheet-in{margin-top:auto; margin-left:auto; margin-right:auto; width:100%; max-width:480px; background:var(--bg);
    border-top:1px solid var(--line); border-radius:22px 22px 0 0; max-height:90vh; display:flex; flex-direction:column;
    box-shadow:0 -20px 50px -20px #000; animation:slideup .28s ease}
  @keyframes slideup{from{transform:translateY(28px)} to{transform:none}}
  @media(prefers-reduced-motion:reduce){.sheet-in{animation:none}}
  .sheet-head{padding:15px 16px 12px; border-bottom:1px solid var(--line)}
  .sheet-head .sh-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
  .sheet-head h3{margin:0; font-size:17px}
  .sheet-head .x{width:34px; height:34px; border-radius:50%; background:var(--surface); border:1px solid var(--line); color:var(--muted); font-size:15px}
  .sheet-search{width:100%; padding:11px 12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:var(--text); font-size:14px; font-family:inherit}
  .sheet-search::placeholder{color:var(--muted2)}
  .sheet-search:focus{border-color:var(--amber); outline:none}
  .sheet-body{overflow-y:auto; -webkit-overflow-scrolling:touch; padding:13px 16px 4px; flex:1}
  .sheet-foot{padding:12px 16px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--bg)}
  .pick{display:flex; align-items:center; gap:11px; width:100%; text-align:left; background:var(--surface);
    border:1px solid var(--line); border-radius:11px; padding:10px 12px; margin-bottom:9px}
  .pick.sel{border-color:var(--volt); background:var(--volt-soft)}
  .pick .chk{width:24px; height:24px; border-radius:7px; border:1.5px solid var(--line); flex:none; display:grid; place-items:center; font-size:13px; color:#15200a; background:var(--bg2)}
  .pick.sel .chk{background:var(--volt); border-color:var(--volt)}
  .pick .pk{flex:1; min-width:0}
  .pick .pk h4{margin:0; font-size:13.5px}
  .pick .pk p{margin:2px 0 0; font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .pick .pbadge{flex:none; font-size:8.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:800; padding:3px 7px; border-radius:5px}
  .pbadge.dyn{background:var(--amber-soft); color:var(--amber)}
  .pbadge.act{background:var(--volt-soft); color:var(--volt)}
  .pbadge.sta{background:var(--cool-soft); color:var(--cool)}
  .pbadge.plyo{background:var(--steel-soft); color:var(--steel)}
  .pick-empty{text-align:center; color:var(--muted); font-size:13px; padding:24px 10px}

  /* ---------- Demo / "Watch" affordances ---------- */
  .watch-btn{display:inline-flex; align-items:center; gap:6px; margin-top:6px; padding:7px 11px; border-radius:9px;
    background:var(--steel-soft); border:1px solid rgba(110,168,255,.35); color:var(--steel); font-weight:700; font-size:12px}
  .watch-mini{display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:6px;
    background:var(--steel-soft); border:1px solid rgba(110,168,255,.35); color:var(--steel); font-size:10px; vertical-align:middle; margin-left:5px}
  .watch-run{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin:2px 0 12px; padding:11px;
    border-radius:11px; background:var(--steel-soft); border:1px solid rgba(110,168,255,.4); color:var(--steel); font-weight:800; font-size:13.5px}
  .demo-video{position:relative; width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; overflow:hidden; border:1px solid var(--line)}
  .demo-video iframe{position:absolute; inset:0; width:100%; height:100%; border:0}
  .demo-note{font-size:11.5px; color:var(--muted2); margin:8px 0 2px; text-align:center}
  .demo-meta{margin-top:14px}
  #demoSheet{z-index:120}
</style>
</head>

<!-- Exercise picker sheet (program builder) -->
<div class="sheet" id="pickSheet"><div class="sheet-in" id="pickIn"></div></div>

<!-- Exercise demo sheet (watch before the timer) -->

<script>
/* ============================================================
   DATA
   ============================================================ */

// ---- Master exercise library ----
// cat: dyn(amic warmup) | act(ivation) | sta(tic/cooldown) | plyo(landing)
const EX = [
  // ---------- DYNAMIC WARM-UP ----------
  {id:'march', n:'Marching Knee Hug', cat:'dyn', dose:'30 sec', areas:['Hips','Glutes','Core'],
   cue:'Stand tall, hug knee to chest, squeeze the standing glute.',
   miss:'Rounding the back or rushing — stay tall and controlled.',
   pro:'Add a calf raise on the standing leg at the top.', reg:'Hold a wall or chair for balance.'},
  {id:'swingfb', n:'Leg Swings — Front to Back', cat:'dyn', dose:'10/side', areas:['Hips','Hamstrings'],
   cue:'Loose leg, swing through a pain-free range, hips square.',
   miss:'Forcing height with a stiff back — let the hip do the work.',
   pro:'Increase range as you loosen up.', reg:'Smaller, slower swings; hold support.'},
  {id:'swingside', n:'Leg Swings — Side to Side', cat:'dyn', dose:'10/side', areas:['Hips','Groin / Adductors'],
   cue:'Swing across the body, stay tall, toes forward.',
   miss:'Twisting the torso to throw the leg — keep hips facing forward.',
   pro:'Open the range as the groin warms.', reg:'Lower swing height, use a wall.'},
  {id:'quadpull', n:'Walking Quad Pull + Reach', cat:'dyn', dose:'4/side', areas:['Hips','Quads'],
   cue:'Heel to glute, free arm reaches up, ribs down.',
   miss:'Arching the low back to "feel" the stretch.',
   pro:'Add a slow march step between each rep.', reg:'Do it standing in place with support.'},
  {id:'wgs', n:"World's Greatest Stretch", cat:'dyn', dose:'4/side', areas:['Hips','Groin / Adductors','T-Spine'],
   cue:'Long lunge, drop the back hip, reach hand to ceiling.',
   miss:'Letting the front knee cave inward.',
   pro:'Add an elbow-to-instep dip before the rotation.', reg:'Hands on a bench; shorten the lunge.'},
  {id:'inchworm', n:'Inchworm to Plank', cat:'dyn', dose:'5 reps', areas:['Hamstrings','Core','Shoulders'],
   cue:'Soft knees, walk hands out to a tall plank, walk back.',
   miss:'Hips sagging in the plank — squeeze glutes and brace.',
   pro:'Add a push-up at the plank.', reg:'Bend knees more; shorten the walk-out.'},
  {id:'latlunge', n:'Lateral Lunge (Dynamic)', cat:'dyn', dose:'6/side', areas:['Groin / Adductors','Hips'],
   cue:'Sit into the bent hip, other leg straight, chest up.',
   miss:'Rounding forward or letting the knee collapse in.',
   pro:'Add a reach to the foot of the bent leg.', reg:'Reduce depth; hold a post for balance.'},
  {id:'cossack', n:'Cossack Squat', cat:'dyn', dose:'5/side', areas:['Groin / Adductors','Hips','Ankles'],
   cue:'Shift side to side low and slow, heel of straight leg down.',
   miss:'Rushing and bouncing at the bottom.',
   pro:'Go deeper and add a brief pause each side.', reg:'Hold a support and stay shallow.'},
  {id:'spider', n:'Spiderman Lunge + Rotation', cat:'dyn', dose:'4/side', areas:['Hips','T-Spine'],
   cue:'Step foot outside the hand, rotate, follow your hand with your eyes.',
   miss:'Letting the hips pike up instead of sinking.',
   pro:'Pause 2 sec in the rotated position.', reg:'Skip the rotation; just hold the lunge.'},
  {id:'sqstand', n:'Squat to Stand', cat:'dyn', dose:'6 reps', areas:['Hamstrings','Hips','Ankles'],
   cue:'Grab toes, drop hips down, lift the chest tall, then stand.',
   miss:'Yanking up instead of sinking the hips first.',
   pro:'Add a 2-sec hold at the bottom.', reg:'Hold the shins instead of the toes.'},
  {id:'askip', n:'A-Skips', cat:'dyn', dose:'2×20 m', areas:['Hips','Calves'],
   cue:'Punch the knee up, quick off the ground, tall posture.',
   miss:'Reaching out front and over-striding.',
   pro:'Increase tempo and rhythm.', reg:'Slow A-march with no hop.'},
  {id:'highknee', n:'High Knees', cat:'dyn', dose:'2×20 m', areas:['Hips','Calves'],
   cue:'Knees up, fast feet, stay on the balls of the feet.',
   miss:'Leaning back — keep a slight forward lean.',
   pro:'Increase turnover speed.', reg:'Reduce to a brisk knee-up march.'},
  {id:'buttkick', n:'Butt Kicks', cat:'dyn', dose:'2×20 m', areas:['Quads','Hamstrings'],
   cue:'Heels flick to the glutes, quick and light.',
   miss:'Cycling the whole leg back — keep it under the hips.',
   pro:'Faster turnover.', reg:'Walking heel flicks.'},
  {id:'carioca', n:'Carioca', cat:'dyn', dose:'2×20 m', areas:['Hips','Groin / Adductors','T-Spine'],
   cue:'Hips loose, cross front and back, stay light on the feet.',
   miss:'Stiff hips and crossing too far.',
   pro:'Add speed and exaggerate the hip turn.', reg:'Slow grapevine, small steps.'},
  {id:'armcircle', n:'Arm Circles / Swings', cat:'dyn', dose:'30 sec', areas:['Shoulders'],
   cue:'Big smooth circles forward then back, relaxed neck.',
   miss:'Shrugging the shoulders up to the ears.',
   pro:'Add cross-body arm swings.', reg:'Smaller circles, slower pace.'},
  {id:'pullapart', n:'Band Pull-Aparts', cat:'act', dose:'15 reps', areas:['Shoulders','Stabilizers'],
   cue:'Pull the band apart to the chest, squeeze the shoulder blades.',
   miss:'Shrugging or arching the back to move the band.',
   pro:'Use a heavier band or slow the return.', reg:'Lighter band or wider grip.'},
  {id:'openbook', n:'Open Book (T-Spine)', cat:'dyn', dose:'6/side', areas:['T-Spine','Shoulders'],
   cue:'On your side, open the top arm, follow the hand with your eyes.',
   miss:'Letting the knees roll open — keep them stacked and down.',
   pro:'Hold the end position for 2 breaths.', reg:'Smaller rotation range.'},
  {id:'pogo', n:'Pogo Hops', cat:'plyo', dose:'2×15', areas:['Calves','Ankles'],
   cue:'Stiff ankles, quiet bounce, stay tall like a pogo stick.',
   miss:'Bending the knees deep and landing heavy/loud.',
   pro:'Single-leg pogos.', reg:'Smaller, slower hops or fast heel raises.'},
  {id:'9090', n:'90/90 Hip Switch', cat:'dyn', dose:'8/side', areas:['Hips'],
   cue:'Sit tall, rotate both knees side to side, chest proud.',
   miss:'Collapsing the chest and using hands to muscle through.',
   pro:'Lift the hips slightly off the floor each switch.', reg:'Reduce range; use hands for support.'},
  {id:'anklerock', n:'Knee-to-Wall Ankle Rock', cat:'dyn', dose:'8/side', areas:['Ankles','Calves'],
   cue:'Drive the knee over the toes toward the wall, heel stays down.',
   miss:'Heel lifting or knee caving inward.',
   pro:'Move the foot back to increase the challenge.', reg:'Move the foot closer to the wall.'},

  // ---------- ACTIVATION ----------
  {id:'bridge', n:'Glute Bridge', cat:'act', dose:'12 reps', areas:['Glutes','Core'], target:'Glutes',
   cue:'Drive through the heels, squeeze the glutes, ribs down.',
   miss:'Arching the low back instead of finishing with the glutes.',
   pro:'Pause 2 sec at the top.', reg:'Smaller range of motion.'},
  {id:'slbridge', n:'Single-Leg Glute Bridge', cat:'act', dose:'8/side', areas:['Glutes','Stabilizers'], target:'Glutes',
   cue:'One foot down, hips level, push through the heel.',
   miss:'Letting the free-side hip drop.',
   pro:'Slow the lower to 3 seconds.', reg:'Keep the free foot lightly on the floor.'},
  {id:'monster', n:'Lateral Band Walk', cat:'act', dose:'10/side', areas:['Glutes','Stabilizers'], target:'Glutes',
   cue:'Band above knees, stay low, push the knees out, small steps.',
   miss:'Standing up tall and letting knees cave in.',
   pro:'Band at the ankles or heavier band.', reg:'Lighter band, shorter steps.'},
  {id:'clam', n:'Clamshell', cat:'act', dose:'12/side', areas:['Glutes','Stabilizers'], target:'Glutes',
   cue:'Heels together, open the top knee, keep hips stacked.',
   miss:'Rolling the hips back to cheat the range.',
   pro:'Add a band around the knees.', reg:'Smaller opening, no band.'},
  {id:'deadbug', n:'Dead Bug', cat:'act', dose:'6/side', areas:['Core'], target:'Core',
   cue:'Low back pressed down, ribs down, extend opposite arm and leg slowly.',
   miss:'Low back popping up off the floor.',
   pro:'Slow the tempo or add a light weight.', reg:'Move only the legs, keep arms still.'},
  {id:'birddog', n:'Bird Dog', cat:'act', dose:'8/side', areas:['Core','Stabilizers'], target:'Core',
   cue:'Reach opposite arm and leg long, hips level, brace the middle.',
   miss:'Rotating the hips or arching the back.',
   pro:'Pause 2 sec and add a small "stir" at the end.', reg:'Move only one limb at a time.'},
  {id:'plank', n:'Front Plank', cat:'act', dose:'30 sec', areas:['Core','Stabilizers'], target:'Core',
   cue:'Elbows under shoulders, squeeze glutes, long straight line.',
   miss:'Hips sagging or piking up.',
   pro:'Add shoulder taps.', reg:'Drop to the knees.'},
  {id:'sideplank', n:'Side Plank', cat:'act', dose:'25 sec/side', areas:['Core','Stabilizers'], target:'Stabilizers',
   cue:'Stack the body, lift the hips high, reach tall.',
   miss:'Letting the bottom hip sink.',
   pro:'Lift the top leg.', reg:'Bend the bottom knee for support.'},
  {id:'copen', n:'Copenhagen Plank', cat:'act', dose:'20 sec/side', areas:['Groin / Adductors','Stabilizers'], target:'Adductors',

const main = document.getElementById('main');
const backBtn = document.getElementById('backBtn');
let history = [{view:'home',opt:null}];
let activeTab = 'home';

function setTab(t){
  activeTab = t;
  document.querySelectorAll('.tab').forEach(b=>{
    const on = b.dataset.tab===t;
    b.classList.toggle('on', on);
    b.classList.toggle('cooltab', on && (t==='cool'||t==='mobility'));
  });
}
function nav(view, opt){ history=[{view:'home',opt:null}]; if(view!=='home') history.push({view,opt:opt||null}); render(view,opt); }
function push(view, opt){ history.push({view,opt:opt||null}); render(view,opt); }
function goBack(){ if(history.length>1){ history.pop(); const top=history[history.length-1]; render(top.view, top.opt); } }
function updateBack(){ backBtn.classList.toggle('show', history.length>1); }
// jump straight to a client's detail with a clean back trail (clients → detail)
function goDetail(id){ history=[{view:'home',opt:null},{view:'clients',opt:null},{view:'clientDetail',opt:id}]; render('clientDetail',id); }

function render(view, opt){
  window.scrollTo(0,0);
  updateBack();
  // sync tab highlight (client sub-views keep the Clients tab lit)
  const tabMap={home:'home',clients:'clients',clientDetail:'clients',clientForm:'clients',
    programBuilder:'clients',warm:'warm',cool:'cool',tools:'tools'};
  if(tabMap[view]) setTab(tabMap[view]);
  const fn = VIEWS[view] || VIEWS.home;
  main.innerHTML = `<div class="view">${fn(opt)}</div>`;
  if(view==='home') initWizard();
  else if(view==='clients') loadClientList();
  else if(view==='clientDetail') loadClientDetail(opt);
  else if(view==='clientForm') initClientForm(opt);
  else if(view==='programBuilder') initBuilder(opt);
}

intake(){

    ['What\'s your training background?','New to this, returning, or experienced and consistent?'],
    ['What\'s the goal?','Strength, sport, general fitness, mobility, weight, feeling better?'],
    ['Sport &amp; position (if any)?','Demands differ — a guard, a center, and a lifter warm up differently.'],
    ['How does your body feel today, 1–10?','Quick daily check before you pick the day\'s routine.'],
    ['Sleep, stress &amp; soreness today?','Rough night or high soreness = lower the intensity.'],
    ['Any movement that hurts right now?','Squat, hinge, overhead, running, jumping, twisting?'],

// Turn a YouTube / Vimeo / other URL into an embeddable form (or a plain link).
function toEmbed(url){
  if(!url) return null;
  try{
    const u = new URL(url, location.href);
    const host = u.hostname.replace(/^www\./,'');
    let id = '';
    if(host === 'youtu.be') id = u.pathname.slice(1);
    else if(host.endsWith('youtube.com') || host.endsWith('youtube-nocookie.com')){
      if(u.pathname.startsWith('/watch')) id = u.searchParams.get('v') || '';
      else if(u.pathname.startsWith('/shorts/')) id = u.pathname.split('/')[2] || '';
      else if(u.pathname.startsWith('/embed/')) id = u.pathname.split('/')[2] || '';
    }
    if(id){
      const t = u.searchParams.get('t') || u.searchParams.get('start');
      let start = '';
      if(t){ const s = parseInt(String(t).replace(/[^0-9]/g,''),10); if(s) start = '&start=' + s; }
      return { type:'iframe', src:`https://www.youtube-nocookie.com/embed/${id}?rel=0&modestbranding=1&playsinline=1${start}` };
    }
    if(host === 'vimeo.com'){
      const vid = u.pathname.split('/').filter(Boolean)[0];
      if(/^\d+$/.test(vid)) return { type:'iframe', src:`https://player.vimeo.com/video/${vid}` };
    }
  }catch(e){}
  return { type:'link', src:url };
}

function getSeg(name){ const el=document.querySelector(`.seg[data-w="${name}"] button.on`); return el?el.dataset.v:''; }
function runWizard(){
  const level=getSeg('level'), type=getSeg('type'), time=getSeg('time');
  const area=document.getElementById('wArea').value;
  const injury=document.getElementById('wInjury').checked;
  let key, note='';
  if(type==='Recovery'){ key='recovery'; note='Off-day flow — go gentle and breathe.'; }
  else if(type==='Basketball'){
    if(time==='15'||level==='Athlete'){ key='bball'; }
    else if(time==='10'){ key='w10'; note='Add slides, closeouts &amp; 5 stick-the-landings from the Basketball pre-game.'; }
    else { key='q5'; note='Add defensive slides + 5 stick-the-landings before tip.'; }
  }
  else if(type==='Weights'){
    if(time==='5'){ key='q5'; note='Add band pull-aparts + a glute bridge, then ramp-up sets.'; }
    else { key='lift'; }
  }
  else { // General
    if(time==='5') key='q5';
    else if(time==='10') key='w10';
    else key = (level==='Athlete')?'a15':'w10';
    if(time==='15'&&level!=='Athlete') note='At this level, the 10-min standard is plenty — add mobility instead of intensity.';

    <div class="chips"><span class="pill amber">${r.mins} min</span><span class="pill">${r.level}</span><span class="pill">${r.type}</span></div>`;

/* ============================================================
   RUNNER (the signature feature)
   ============================================================ */
let run={routine:null,i:0,timer:null,remaining:0,mode:'down',paused:false,auto:true,cold:false};

// Run a built-in routine (by key) or a saved client program (by id)
function runBuiltin(key){ startRunner(R[key]); }
async function runProgram(id){
  const p = await Store.getProgram(id);
  if(!p){ alert('Program not found.'); return; }
  startRunner(programToRoutine(p));
}
// Saved programs store steps as objects; the runner expects [name,dose,cue] arrays
function programToRoutine(p){
  return { title:p.title||'Program', tag:(p.kind==='cool'?'cool':'warm'),
    steps:(p.steps||[]).map(s=>[s.name, s.dose, s.cue]) };
}

function parseSeconds(d){
  d=d.toLowerCase();
  let m=d.match(/(\d+)\s*min/); if(m) return parseInt(m[1])*60;
  m=d.match(/(\d+)\s*sec/); if(m) return parseInt(m[1]);
  m=d.match(/(\d+)\s*s\b/); if(m) return parseInt(m[1]);
  return null; // rep-based
}
function fmt(s){ s=Math.max(0,Math.round(s)); const m=Math.floor(s/60); const ss=s%60; return m+':'+String(ss).padStart(2,'0'); }

function startRunner(routine){
  if(!routine || !routine.steps || !routine.steps.length){
    alert('This program has no exercises yet — add a few moves, then run it.'); return;
  }
  run.routine=routine; run.i=0; run.cold=(routine.tag==='cool'); run.auto=true; run.paused=false;
  document.getElementById('runner').classList.add('show');
  document.getElementById('runner').classList.toggle('cold-run', run.cold);
  loadStep();
}
function loadStep(){
  clearInterval(run.timer);
  const r=run.routine; const total=r.steps.length;
  if(run.i>=total){ renderDone(); return; }
  const [name,dose,cue]=r.steps[run.i];
  const secs=parseSeconds(dose);
  run.mode = secs!==null?'down':'up';
  run.remaining = secs!==null?secs:0;
  run.paused=false;
  drawRunner();
  startTick();
}
function startTick(){
  clearInterval(run.timer);
  run.timer=setInterval(()=>{
    if(run.paused) return;
    if(run.mode==='down'){
      run.remaining--;
      if(run.remaining<=0){
        clearInterval(run.timer);
        flashClock();
        beep();
        if(run.auto){ setTimeout(nextStep,650); }
        else { document.getElementById('clockEl').textContent='0:00'; return; }
      }
    } else {
      run.remaining++;
    }
    const c=document.getElementById('clockEl'); if(c) c.textContent=fmt(run.remaining);
  },1000);
}
function drawRunner(){
  const r=run.routine; const total=r.steps.length;
  const [name,dose,cue]=r.steps[run.i];
  const vid=idForName(name); const dem=vid&&VIDEOS[vid];
  const dots=r.steps.map((_,idx)=>`<i class="${idx<run.i?'done':idx===run.i?'cur':''}"></i>`).join('');
  const clockTxt = run.mode==='down'?fmt(run.remaining):'0:00';
  const hint = run.mode==='up'?'<div class="autorow">Rep-based — go at your pace, then tap Next</div>'
    :`<div class="autorow"><input type="checkbox" id="autoChk" ${run.auto?'checked':''} onchange="run.auto=this.checked"> Auto-advance when timer ends</div>`;
  document.getElementById('runnerIn').innerHTML=`
    <div class="rtop">
      <div class="rname">${r.title} · ${run.i+1}/${total}</div>
      <button class="x" onclick="closeRunner()" aria-label="Close">✕</button>
    </div>
    <div class="progress ${run.cold?'cold':''}">${dots}</div>
    <div class="stepwrap">
      <div class="count">${run.mode==='up'?'Reps':'Timer'}</div>
      <div class="movename display">${name}</div>
      <div class="dosebig">${dose}</div>
      <div class="clock display" id="clockEl">${clockTxt}</div>
    </div>
    <div class="cuebar">
      <div class="lbl">Coach cue</div>
      <p>${cue}</p>
    </div>
    ${dem?`<button class="watch-run" onclick="watchInRunner('${vid}')">▶ Watch demo</button>`:''}
    ${hint}
    <div class="rctrl">
      <button onclick="prevStep()" ${run.i===0?'disabled style="opacity:.4"':''}>‹ Prev</button>
      <button class="play" onclick="togglePause()" id="playBtn">${run.paused?'▶':'❚❚'}</button>
      <button class="next" onclick="nextStep()">${run.i===total-1?'Finish ✓':'Next ›'}</button>
    </div>`;
}
function flashClock(){ const c=document.getElementById('clockEl'); if(c){ c.classList.add('flash'); setTimeout(()=>c.classList.remove('flash'),500);} }
function togglePause(){ run.paused=!run.paused; const b=document.getElementById('playBtn'); if(b) b.textContent=run.paused?'▶':'❚❚'; }
function nextStep(){ clearInterval(run.timer); run.i++; loadStep(); }
function prevStep(){ if(run.i>0){ clearInterval(run.timer); run.i--; loadStep(); } }
function renderDone(){
  clearInterval(run.timer);
  const r=run.routine;
  document.getElementById('runnerIn').innerHTML=`
    <div class="rtop"><div class="rname">${r.title}</div><button class="x" onclick="closeRunner()">✕</button></div>
    <div class="stepwrap">
      <div class="done-screen">
        <div class="big display">${run.cold?'RECOVERED':'PRIMED &amp; READY'}</div>
        <p style="color:var(--muted);font-size:14px;max-width:30ch;margin:10px auto 0">
          ${run.cold?'Nice work winding down. Hydrate, refuel, and get good sleep — that\'s where adaptation happens.':'Body\'s warm and switched on. Go get after it — and remember the pain rules if anything feels off.'}</p>
      </div>
    </div>
    <div class="rctrl">
      <button onclick="run.i=0;loadStep()">↻ Restart</button>
      <button class="next" onclick="closeRunner()">Done ✓</button>
    </div>`;
}
function closeRunner(){ clearInterval(run.timer); document.getElementById('runner').classList.remove('show'); }
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=run.cold?520:760;
    g.gain.setValueAtTime(.0001,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.25,ctx.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.32);
    o.start(); o.stop(ctx.currentTime+.34);
  }catch(e){}
}

/* ============================================================
   STORE — persistence seam (IndexedDB, with in-memory fallback).
   Every read/write goes through here. Phase 2 swaps the impl for cloud.
   ============================================================ */
const Store = (function(){
  const DB='prime', VER=1;
  let db=null, mem=null;
  function useMem(){ if(!mem) mem={clients:new Map(),programs:new Map(),meta:new Map()}; return mem; }
  function byName(a,b){ return (a.name||'').localeCompare(b.name||''); }
  function byCreated(a,b){ return (a.createdAt||'').localeCompare(b.createdAt||''); }
  function openDB(){
    return new Promise((resolve)=>{
      let req;
      try{ req=indexedDB.open(DB,VER); }
      catch(e){ resolve(null); return; }
      req.onupgradeneeded=()=>{
        const d=req.result;
        if(!d.objectStoreNames.contains('clients')) d.createObjectStore('clients',{keyPath:'id'});
        if(!d.objectStoreNames.contains('programs')){
          const s=d.createObjectStore('programs',{keyPath:'id'}); s.createIndex('clientId','clientId',{unique:false});
        }
        if(!d.objectStoreNames.contains('meta')) d.createObjectStore('meta',{keyPath:'key'});
      };
      req.onsuccess=()=>resolve(req.result);
      req.onerror=()=>resolve(null);
    });
  }
  function os(store,mode){ return db.transaction(store,mode).objectStore(store); }
  function p(r){ return new Promise((res,rej)=>{ r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
  return {
    async init(){
      db=await openDB();
      if(!db) console.warn('PRIME: IndexedDB unavailable — using in-memory store (data won\'t persist this session).');
    },
    async listClients(){
      if(!db) return Array.from(useMem().clients.values()).sort(byName);
      return (await p(os('clients','readonly').getAll())).sort(byName);
    },
    async getClient(id){
      if(!db) return useMem().clients.get(id)||null;
      return (await p(os('clients','readonly').get(id)))||null;
    },
    async saveClient(c){
      if(!db){ useMem().clients.set(c.id,c); return c; }
      await p(os('clients','readwrite').put(c)); return c;
    },
    async deleteClient(id){
      if(!db){ useMem().clients.delete(id); for(const[k,pr]of useMem().programs){ if(pr.clientId===id) useMem().programs.delete(k);} return; }
      await p(os('clients','readwrite').delete(id));
      const ps=await this.listPrograms(id);
      const s=os('programs','readwrite'); ps.forEach(pr=>s.delete(pr.id));
    },
    async listPrograms(clientId){
      if(!db){ let a=Array.from(useMem().programs.values()); if(clientId) a=a.filter(pr=>pr.clientId===clientId); return a.sort(byCreated); }
      const all = clientId
        ? await p(os('programs','readonly').index('clientId').getAll(clientId))
        : await p(os('programs','readonly').getAll());
      return all.sort(byCreated);
    },
    async getProgram(id){
      if(!db) return useMem().programs.get(id)||null;
      return (await p(os('programs','readonly').get(id)))||null;
    },
    async saveProgram(pr){
      if(!db){ useMem().programs.set(pr.id,pr); return pr; }
      await p(os('programs','readwrite').put(pr)); return pr;
    },
    async deleteProgram(id){
      if(!db){ useMem().programs.delete(id); return; }
      await p(os('programs','readwrite').delete(id));
    },
    async getMeta(key){
      if(!db) return useMem().meta.get(key);
      const r=await p(os('meta','readonly').get(key)); return r?r.value:undefined;
    },
    async setMeta(key,value){
      if(!db){ useMem().meta.set(key,value); return; }
      await p(os('meta','readwrite').put({key,value}));
    },
  };
})();

    return `<button class="cl-card" onclick="push('clientDetail','${c.id}')">
      <div class="cl-av">${esc(init)}</div>
      <div class="ct"><h3>${esc(c.name||'Unnamed')}</h3><p>${esc(sub)}</p></div>
      <div class="cnt"><b>${n}</b><span>program${n===1?'':'s'}</span></div></button>`;
  }));
  el.innerHTML=rows.join('');
}

async function loadClientDetail(id){
  const el=document.getElementById('cdWrap'); if(!el) return;
  const c=await Store.getClient(id);
  if(!c){
    el.innerHTML=`<div class="empty"><div class="em-ic">🔍</div><h3>Client not found</h3><p>It may have been deleted.</p></div>
      <button class="btn sec full" onclick="nav('clients')" style="margin-top:14px">Back to clients</button>`;
    return;
  }
  const programs=await Store.listPrograms(id);
  const warm=programs.filter(x=>x.kind!=='cool'), cool=programs.filter(x=>x.kind==='cool');
  const pgCard=pr=>{
    const w=pr.kind!=='cool'; const n=(pr.steps||[]).length;
    return `<div class="pg-card ${w?'warm':'cool'}"><div class="accent"></div>
      <div class="pg-top"><h3>${esc(pr.title||'Untitled program')}</h3>
        <span class="kindtag ${w?'warm':'cool'}">${w?'Warm-Up':'Cooldown'}</span></div>
      <div class="pg-sub">${n} move${n===1?'':'s'}${pr.source==='template'?' · from template':''}</div>
      <div class="pg-act">
        <button class="btn ${w?'primary':'coolb'} sm" onclick="runProgram('${pr.id}')">▶ Run</button>
        <button class="btn sec sm" onclick="editProgram('${pr.id}')">Edit</button></div></div>`;
  };
  let h=`<div class="rd-head">
    <div class="chips" style="margin-top:2px">
      ${c.level?`<span class="pill amber">${esc(c.level)}</span>`:''}
      ${c.sport?`<span class="pill">${esc(c.sport)}</span>`:''}
    </div>
    <h2 class="display" style="font-size:30px;margin:8px 0 4px">${esc(c.name||'Unnamed')}</h2>
    ${c.goals?`<p style="color:var(--muted);font-size:13px;margin:0">Goal: ${esc(c.goals)}</p>`:''}
  </div>`;
  if(c.injuries && c.injuries.trim())
    h+=`<div class="callout" style="border-color:rgba(255,90,90,.3);background:var(--red-soft)">
      <b style="color:var(--red)">Injury notes:</b> ${esc(c.injuries)} · <a onclick="push('pain')" style="cursor:pointer">pain rules ›</a></div>`;
  if(c.notes && c.notes.trim())
    h+=`<div class="callout"><b>Notes:</b> ${esc(c.notes)}</div>`;
  h+=`<div class="btnrow"><button class="btn primary full" onclick="newProgram('${c.id}','warm')">＋ Build a program</button></div>
    <button class="btn sec full" onclick="openTemplatePicker('${c.id}')" style="margin-bottom:4px">Start from a template</button>
    <div class="eyebrow">Saved programs</div>`;
  if(!programs.length)
    h+=`<div class="empty" style="padding:26px 20px"><div class="em-ic">🗂️</div>
      <p>No programs yet. Build one from scratch or start from a template above.</p></div>`;
  else h+=warm.map(pgCard).join('')+cool.map(pgCard).join('');
  h+=`<div class="btnrow"><button class="btn sec sm" onclick="push('clientForm','${c.id}')">Edit client</button>
    <button class="btn danger sm" onclick="confirmDeleteClient('${c.id}')">Delete client</button></div>`;
  el.innerHTML=h;
}

async function confirmDeleteClient(id){
  const c=await Store.getClient(id);
  if(!confirm(`Delete ${c?c.name:'this client'} and all their saved programs? This can't be undone.`)) return;
  await Store.deleteClient(id);
  nav('clients');
}

/* ============================================================
   CLIENT FORM (new / edit)
   ============================================================ */
async function initClientForm(id){
  const el=document.getElementById('cfWrap'); if(!el) return;
  let c={name:'',level:'',sport:'',goals:'',injuries:'',notes:''}, editing=false;
  if(id){ const ex=await Store.getClient(id); if(ex){ c=ex; editing=true; } }
  const levels=['Beginner','Intermediate','Athlete'];
  const lbl='display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-weight:700;margin-bottom:7px';
  el.innerHTML=`
    <div class="hero" style="margin-bottom:8px"><h2 class="display" style="font-size:30px">${editing?'EDIT CLIENT':'NEW CLIENT'}</h2></div>
    <div class="wizard">
      <div class="field"><label style="${lbl}">Name</label>
        <input class="input" id="fName" value="${esc(c.name)}" placeholder="e.g. Marcus T."></div>
      <div class="field"><label style="${lbl}">Level</label>
        <div class="seg" id="fLevel">${levels.map(l=>`<button data-v="${l}" class="${c.level===l?'on':''}" onclick="segPick(this)">${l}</button>`).join('')}</div></div>
      <div class="field"><label style="${lbl}">Sport / focus</label>
        <input class="input" id="fSport" value="${esc(c.sport)}" placeholder="Basketball — guard, general fitness…"></div>
      <div class="field"><label style="${lbl}">Goal</label>
        <input class="input" id="fGoal" value="${esc(c.goals)}" placeholder="Strength, mobility, return from injury…"></div>
      <div class="field"><label style="${lbl}">Injury notes <span style="color:var(--muted2)">(optional)</span></label>
        <textarea class="input" id="fInj" placeholder="Anything to train around — shown on their page.">${esc(c.injuries)}</textarea></div>
      <div class="field"><label style="${lbl}">General notes <span style="color:var(--muted2)">(optional)</span></label>
        <textarea class="input" id="fNotes" placeholder="Schedule, preferences, reminders…">${esc(c.notes)}</textarea></div>
      <div class="btnrow"><button class="btn primary full" onclick="saveClientForm(${editing?`'${id}'`:'null'})">${editing?'Save changes':'Add client'}</button></div>
    </div>`;
}
function segPick(btn){ const seg=btn.parentElement; seg.querySelectorAll('button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }
function getSegV(id){ const el=document.querySelector('#'+id+' button.on'); return el?el.dataset.v:''; }
async function saveClientForm(id){
  const name=document.getElementById('fName').value.trim();
  if(!name){ alert('Give the client a name first.'); return; }
  const existing = id? await Store.getClient(id) : null;
  const c={ id:id||uid(), ownerId:'local', name,
    level:getSegV('fLevel'),
    sport:document.getElementById('fSport').value.trim(),
    goals:document.getElementById('fGoal').value.trim(),
    injuries:document.getElementById('fInj').value.trim(),
    notes:document.getElementById('fNotes').value.trim(),
    createdAt: existing?existing.createdAt:nowISO(), updatedAt:nowISO() };
  await Store.saveClient(c);
  goDetail(c.id);
}

/* ============================================================
   PROGRAM BUILDER
   ============================================================ */
let builder=null; // {id,clientId,title,kind,source,steps:[{name,dose,cue}]}

function newProgram(clientId, kind){
  builder={ id:uid(), clientId, title:'', kind:kind||'warm', source:'custom', steps:[] };
  push('programBuilder');
}
async function editProgram(id){
  const pr=await Store.getProgram(id);
  if(!pr){ alert('Program not found.'); return; }
  builder={ id:pr.id, clientId:pr.clientId, title:pr.title, kind:pr.kind, source:pr.source||'custom',
    steps:(pr.steps||[]).map(s=>({name:s.name,dose:s.dose,cue:s.cue})) };
  push('programBuilder');
}
function templateToBuilder(clientId, key){
  const r=R[key];
  builder={ id:uid(), clientId, title:r.title, kind:(r.tag==='cool'?'cool':'warm'), source:'template',
    steps:r.steps.map(s=>({name:s[0],dose:s[1],cue:s[2]})) };
  closePicker();
  push('programBuilder');
}
function initBuilder(){ renderBuilder(); }

function renderBuilder(){
  const el=document.getElementById('pbWrap'); if(!el||!builder) return;
  const cool=builder.kind==='cool';
  const lbl='display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-weight:700;margin-bottom:7px';
  const steps=builder.steps.map((s,i)=>`
    <div class="bstep">
      <div class="ord">
        <button onclick="moveStep(${i},-1)" ${i===0?'disabled':''} aria-label="Move up">▲</button>
        <button onclick="moveStep(${i},1)" ${i===builder.steps.length-1?'disabled':''} aria-label="Move down">▼</button>
      </div>
      <div class="bmain">
        <div class="bmove"><span>${esc(s.name)}</span>
          <button class="del" onclick="removeStep(${i})" aria-label="Remove">✕</button></div>
        <div class="brow">
          <div class="bf dose"><label>Dose</label>
            <input class="bi" value="${esc(s.dose)}" oninput="updStep(${i},'dose',this.value)" placeholder="30 sec"></div>
          <div class="bf"><label>Coach cue</label>
            <textarea class="bi" oninput="updStep(${i},'cue',this.value)" placeholder="What to say / focus on">${esc(s.cue)}</textarea></div>
        </div>
      </div>
    </div>`).join('');
  el.innerHTML=`
    <div class="hero" style="margin-bottom:8px"><h2 class="display" style="font-size:28px">${builder.source==='template'?'EDIT PROGRAM':'BUILD A PROGRAM'}</h2>
      <p>Name it, pick a type, add moves, then set each dose and cue. Reorder with the arrows.</p></div>
    <div class="field"><label style="${lbl}">Program name</label>
      <input class="input" id="bTitle" value="${esc(builder.title)}" oninput="builder.title=this.value" placeholder="${cool?'e.g. Post-lift cooldown':'e.g. Game-day warm-up'}"></div>
    <div class="field"><label style="${lbl}">Type</label>
      <div class="seg ${cool?'cool':''}" id="bKind">
        <button class="${!cool?'on':''}" onclick="setKind('warm')">Warm-Up</button>
        <button class="${cool?'on':''}" onclick="setKind('cool')">Cooldown</button></div></div>
    <div class="eyebrow">Exercises</div>
    ${builder.steps.length?steps:'<div class="empty" style="padding:24px 20px"><div class="em-ic">➕</div><p>No moves yet — add exercises from the library below.</p></div>'}
    <button class="add-ex" onclick="openPicker()">＋ Add exercises from library</button>
    ${builder.steps.length?`<div class="bcount">${builder.steps.length} move${builder.steps.length===1?'':'s'} in this program</div>`:''}
    <button class="run-btn" onclick="runBuilderNow()" style="position:static;box-shadow:none;margin-top:8px;${cool?'background:linear-gradient(135deg,var(--cool),#1fae9e);color:#06201d':''}">▶ Save &amp; Run It</button>
    <div class="btnrow">
      <button class="btn primary full" onclick="saveBuilder()">Save program</button>
      <button class="btn sec" onclick="cancelBuilder()">Cancel</button>
    </div>`;
}
function setKind(k){ builder.kind=k; renderBuilder(); }
function moveStep(i,dir){ const j=i+dir; if(j<0||j>=builder.steps.length) return; const a=builder.steps; const t=a[i]; a[i]=a[j]; a[j]=t; renderBuilder(); }
function removeStep(i){ builder.steps.splice(i,1); renderBuilder(); }
function updStep(i,field,val){ if(builder.steps[i]) builder.steps[i][field]=val; } // silent: no re-render, preserves focus
function cancelBuilder(){ if(builder&&builder.clientId) goDetail(builder.clientId); else nav('clients'); }

function builderToProgram(){
  const title=(builder.title&&builder.title.trim())?builder.title.trim():(builder.kind==='cool'?'Cooldown':'Warm-Up');
  return { id:builder.id, ownerId:'local', clientId:builder.clientId, title, kind:builder.kind,
    source:builder.source||'custom', steps:builder.steps.map(s=>({name:s.name,dose:s.dose,cue:s.cue})) };
}
async function saveBuilderQuiet(){
  if(!builder) return;
  const pr=builderToProgram();
  const existing=await Store.getProgram(pr.id);
  pr.createdAt = existing?existing.createdAt:nowISO(); pr.updatedAt=nowISO();
  await Store.saveProgram(pr);
}
async function saveBuilder(){ await saveBuilderQuiet(); goDetail(builder.clientId); }
async function runBuilderNow(){
  if(!builder || !builder.steps.length){ alert('Add at least one exercise first.'); return; }
  await saveBuilderQuiet();
  startRunner(programToRoutine(builderToProgram()));
}

/* ============================================================
   EXERCISE PICKER (shared sheet) + template picker
   ============================================================ */
let pickSel=new Set(), pickFilter='All', pickQuery='';

function openPicker(){
  pickSel=new Set(); pickFilter='All'; pickQuery='';
  document.getElementById('pickIn').innerHTML=pickMarkup();
  document.getElementById('pickSheet').classList.add('show');
  setTimeout(()=>{ const s=document.getElementById('pkSearch'); if(s) s.focus(); },80);
}
function closePicker(){ document.getElementById('pickSheet').classList.remove('show'); }
function pickMarkup(){
  const cats=[['All','All'],['dyn','Dynamic'],['act','Activation'],['sta','Static'],['plyo','Landing']];
  return `<div class="sheet-head">
    <div class="sh-top"><h3>Add exercises</h3><button class="x" onclick="closePicker()" aria-label="Close">✕</button></div>
    <input class="sheet-search" id="pkSearch" placeholder="Search moves or body areas…" oninput="pickQuery=this.value;refreshPicks()">
    <div class="filterbar" style="padding:11px 0 0" id="pkFilter">
      ${cats.map(([c,l])=>`<button class="${c===pickFilter?'on':''}" onclick="pickFilter='${c}';syncPickFilter(this);refreshPicks()">${l}</button>`).join('')}
    </div>
  </div>
  <div class="sheet-body" id="pkList">${pickRows()}</div>
  <div class="sheet-foot"><button class="btn primary full" id="pkAdd" onclick="commitPicks()">Add ${pickSel.size} exercise${pickSel.size===1?'':'s'}</button></div>`;
}
function matchPick(e){
  if(pickFilter!=='All' && e.cat!==pickFilter) return false;
  if(pickQuery){ const q=pickQuery.toLowerCase();
    if(!(e.n.toLowerCase().includes(q) || e.areas.join(' ').toLowerCase().includes(q))) return false; }
  return true;
}
function pickRows(){
  const list=EX.filter(matchPick);
  if(!list.length) return '<div class="pick-empty">No moves match — try another search.</div>';
  return list.map(e=>{
    const sel=pickSel.has(e.id); const [bc,bl]=badgeFor(e.cat);
    return `<button class="pick ${sel?'sel':''}" onclick="togglePick('${e.id}',this)">
      <div class="chk">${sel?'✓':''}</div>
      <div class="pk"><h4>${e.n}</h4><p>${e.dose} · ${e.areas.join(', ')}</p></div>
      <span class="pbadge ${bc}">${bl}</span></button>`;
  }).join('');
}
function refreshPicks(){ const l=document.getElementById('pkList'); if(l) l.innerHTML=pickRows(); }
function syncPickFilter(btn){ document.querySelectorAll('#pkFilter button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }
function togglePick(id,btn){
  const has=pickSel.has(id);
  if(has) pickSel.delete(id); else pickSel.add(id);
  if(btn){ btn.classList.toggle('sel',!has); const c=btn.querySelector('.chk'); if(c) c.textContent=!has?'✓':''; }
  const add=document.getElementById('pkAdd'); if(add) add.textContent=`Add ${pickSel.size} exercise${pickSel.size===1?'':'s'}`;
}
function commitPicks(){
  if(!pickSel.size){ closePicker(); return; }
  EX.forEach(e=>{ if(pickSel.has(e.id)) builder.steps.push({name:e.n,dose:e.dose,cue:e.cue}); }); // library order
  closePicker(); renderBuilder();
}
function openTemplatePicker(clientId){
  const rows=Object.keys(R).map(k=>{
    const r=R[k]; const w=r.tag!=='cool';
    return `<button class="pick" onclick="templateToBuilder('${clientId}','${k}')">
      <div class="pk"><h4>${r.title}</h4><p>${r.mins} min · ${r.type}</p></div>
      <span class="pbadge ${w?'dyn':'sta'}">${w?'Warm':'Cool'}</span></button>`;
  }).join('');
  document.getElementById('pickIn').innerHTML=`<div class="sheet-head">
    <div class="sh-top"><h3>Start from a template</h3><button class="x" onclick="closePicker()" aria-label="Close">✕</button></div>
    <p style="margin:0;font-size:12.5px;color:var(--muted)">Creates an editable copy for this client — tweak it freely.</p></div>
    <div class="sheet-body">${rows}</div>`;
  document.getElementById('pickSheet').classList.add('show');
}

/* ============================================================
   INIT + PWA
   ============================================================ */
(async function(){
  try{ await Store.init(); }catch(e){ console.warn(e); }
  render('home');
})();

// Service worker: only registers from a real origin (https / localhost), not file://
if('serviceWorker' in navigator &&
   (location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1')){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
